{% extends 'base.html' %}

{% block title %}Live Map{% endblock %}
{% block page_title %}LIVE TACTICAL MAP{% endblock %}

{% block extra_head %}
<!-- Leaflet CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
<!-- Leaflet Draw CSS -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css"/>

<style>
    .map-container {
        display: flex;
        height: calc(100vh - 120px);
        margin: -30px; /* Counteract content-area padding for full bleed */
    }
    
    #map {
        flex-grow: 1;
        background-color: #0A0A0F;
        z-index: 1;
    }
    
    .map-sidebar {
        width: 300px;
        background-color: var(--card-bg);
        border-right: 1px solid var(--border-color);
        display: flex;
        flex-direction: column;
        z-index: 2;
        box-shadow: 2px 0 10px rgba(0,0,0,0.5);
    }
    
    .map-sidebar-header {
        padding: 20px;
        border-bottom: 1px solid var(--border-color);
    }
    
    .drone-list {
        flex-grow: 1;
        overflow-y: auto;
        padding: 10px;
    }
    
    .drone-item {
        background: #0A0A0F;
        border: 1px solid var(--border-color);
        border-radius: 4px;
        padding: 15px;
        margin-bottom: 10px;
        cursor: pointer;
        transition: all 0.2s;
    }
    
    .drone-item:hover {
        border-color: var(--accent-cyan);
        box-shadow: 0 0 10px rgba(0,212,255,0.1);
    }
    
    .drone-item.active {
        border-color: var(--accent-cyan);
        background: rgba(0,212,255,0.05);
    }
    
    /* Custom Leaflet Dark Theme Overrides */
    .leaflet-bar a {
        background-color: var(--card-bg) !important;
        color: var(--accent-cyan) !important;
        border-bottom: 1px solid var(--border-color) !important;
    }
    .leaflet-bar a:hover {
        background-color: var(--bg-color) !important;
    }
    .leaflet-popup-content-wrapper {
        background: var(--card-bg);
        color: var(--text-primary);
        border: 1px solid var(--accent-cyan);
        border-radius: 4px;
    }
    .leaflet-popup-tip {
        background: var(--card-bg);
    }
</style>
{% endblock %}

{% block content %}
<div class="map-container">
    <div class="map-sidebar">
        <div class="map-sidebar-header">
            <h3 style="color: var(--accent-cyan); margin-bottom: 10px;"><i class="fa-solid fa-satellite-dish"></i> ACTIVE UNITS</h3>
            <div class="form-group" style="margin-bottom: 0;">
                <input type="text" id="search-drone" class="form-control" placeholder="Search ID or Status..." style="padding: 8px 12px; font-size: 0.85rem;">
            </div>
        </div>
        
        <div class="drone-list" id="drone-list-container">
            <div style="text-align: center; padding: 20px; color: var(--text-secondary);">
                <i class="fa-solid fa-spinner fa-spin"></i> Fetching telemetry...
            </div>
            <!-- Populated via JS -->
        </div>
    </div>
    
    <div id="map"></div>
</div>
{% endblock %}

{% block extra_js %}
<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<!-- Leaflet Draw JS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        // Initialize Map
        const map = L.map('map', {
            zoomControl: false // Move to bottom right
        }).setView([37.7749, -122.4194], 13); // Default SF coords
        
        L.control.zoom({ position: 'bottomright' }).addTo(map);

        // Dark map tiles (CartoDB Dark Matter)
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
            subdomains: 'abcd',
            maxZoom: 20
        }).addTo(map);

        // Geofence layer (Example restricted zone)
        const geofence = L.circle([37.7849, -122.4094], {
            color: 'var(--accent-red)',
            fillColor: '#f03',
            fillOpacity: 0.2,
            radius: 500
        }).addTo(map);
        geofence.bindPopup("<b>RESTRICTED AIRSPACE</b><br>NFZ-Alpha");

        // Layers for drones
        const droneMarkers = {};
        const droneLayer = L.layerGroup().addTo(map);
        
        // Custom drone icon
        const droneIcon = L.divIcon({
            className: 'custom-drone-icon',
            html: '<div style="color: var(--accent-cyan); font-size: 24px; text-shadow: 0 0 10px rgba(0, 212, 255, 0.8);"><i class="fa-solid fa-location-crosshairs"></i></div>',
            iconSize: [24, 24],
            iconAnchor: [12, 12]
        });

        // Polling function
        async function fetchDrones() {
            try {
                const response = await fetch('/api/drones/');
                if (!response.ok) throw new Error('Network response was not ok');
                const drones = await response.json();
                
                updateMapAndSidebar(drones);
            } catch (error) {
                console.error('Failed to fetch telemetry:', error);
            }
        }

        function updateMapAndSidebar(drones) {
            const listContainer = document.getElementById('drone-list-container');
            listContainer.innerHTML = '';
            
            if (drones.length === 0) {
                listContainer.innerHTML = '<div style="text-align: center; padding: 20px; color: var(--text-secondary);">No units registered.</div>';
                return;
            }

            drones.forEach(drone => {
                // Sidebar Item
                let badgeClass = 'badge-offline';
                if (drone.status === 'active') badgeClass = 'badge-active';
                if (drone.status === 'maintenance') badgeClass = 'badge-maintenance';

                const html = `
                    <div class="drone-item" onclick="focusDrone('${drone.drone_id}')">
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                            <strong style="font-family: var(--font-heading);">${drone.drone_id}</strong>
                            <span class="badge ${badgeClass}">${drone.status.toUpperCase()}</span>
                        </div>
                        <div style="font-size: 0.8rem; color: var(--text-secondary);">
                            <div>Model: ${drone.model}</div>
                            <div style="display: flex; justify-content: space-between; margin-top: 5px;">
                                <span><i class="fa-solid fa-battery-half"></i> ${drone.battery_level}%</span>
                                <span><i class="fa-solid fa-arrow-up"></i> ${drone.altitude}m</span>
                            </div>
                        </div>
                    </div>
                `;
                listContainer.insertAdjacentHTML('beforeend', html);

                // Update Map Markers
                if (drone.lat && drone.lng) {
                    const popupContent = `
                        <div style="font-family: var(--font-heading); color: var(--accent-cyan); border-bottom: 1px solid var(--border-color); padding-bottom: 5px; margin-bottom: 5px;">
                            ${drone.drone_id}
                        </div>
                        <div style="font-size: 12px;">
                            Status: <b>${drone.status}</b><br>
                            Battery: ${drone.battery_level}%<br>
                            Alt: ${drone.altitude}m<br>
                            Model: ${drone.model}
                        </div>
                    `;

                    if (droneMarkers[drone.drone_id]) {
                        droneMarkers[drone.drone_id].setLatLng([drone.lat, drone.lng]);
                        droneMarkers[drone.drone_id].setPopupContent(popupContent);
                    } else {
                        const marker = L.marker([drone.lat, drone.lng], {icon: droneIcon});
                        marker.bindPopup(popupContent);
                        marker.addTo(droneLayer);
                        droneMarkers[drone.drone_id] = marker;
                    }
                }
            });
        }

        // Global function for onclick
        window.focusDrone = function(droneId) {
            if (droneMarkers[droneId]) {
                const marker = droneMarkers[droneId];
                map.flyTo(marker.getLatLng(), 16);
                marker.openPopup();
            }
        };

        // Initial fetch and poll every 5s
        fetchDrones();
        setInterval(fetchDrones, 5000);
    });
</script>
{% endblock %}
